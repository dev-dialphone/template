<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Notification Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --green: #16a34a;
            --blue: #0066FF;
            --gray-bg: #f3f4f6;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --text-dark: #1e1b4b; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: var(--gray-900);
            padding: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            background-color: #ffffff;
            width: max-content;
            max-width: 100%;
            position: relative;
            padding: 24px 32px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            display: flex;
            gap: 28px;
        }

        .close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: none;
            border: none;
            color: var(--gray-900);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .close-btn:hover {
            background-color: var(--gray-100);
        }

        .close-btn:active {
            transform: scale(0.95);
        }

        .close-btn svg {
            width: 24px;
            height: 24px;
            stroke-width: 1.5;
        }

        .left-col {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .status-dot-top {
            width: 10px;
            height: 10px;
            background-color: var(--green);
            border-radius: 50%;
            margin-left: 4px;
            margin-bottom: 24px;
        }

        .icon-large {
            width: 96px;
            height: 96px;
            background-color: var(--gray-bg);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-large svg {
            width: 48px;
            height: 48px;
            color: var(--black);
        }

        .notification-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-top: 2px;
        }

        .notification-title-top {
            color: var(--blue);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .info-name {
            font-weight: 700;
            color: var(--black);
            font-size: 24px;
            margin-bottom: 20px;
        }

        .info-name i {
            font-weight: 600;
            font-style: italic;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 14.5px;
            flex-wrap: wrap;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 16px;
        }

        .info-separator {
            color: var(--gray-300);
            font-weight: 300;
            font-size: 18px;
        }

        .info-item {
            color: var(--black);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .info-item svg {
            width: 20px;
            height: 20px;
            color: var(--black);
        }

        .badge-upcoming {
            background-color: var(--gray-bg);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            color: var(--black);
            font-size: 13.5px;
        }

        .btn-outline {
            border: 1px solid var(--gray-400);
            background-color: #ffffff;
            color: var(--text-dark);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-outline:hover {
            background-color: var(--gray-50);
        }

        .btn-outline:active {
            transform: scale(0.98);
            background-color: var(--gray-100);
        }

        .btn-outline svg {
            width: 18px;
            height: 18px;
        }

        .subtext {
            color: var(--gray-800);
            font-size: 15px;
            font-weight: 500;
        }

        @media (max-width: 900px) {
            .card {
                flex-direction: column;
                align-items: flex-start;
            }
            .status-dot-top {
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="__global_nav__" style="background:#111827;color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;font-family:'Inter',sans-serif;position:fixed;top:0;left:0;width:100%;box-sizing:border-box;z-index:99999;box-shadow:0 2px 8px rgba(0,0,0,0.3);">
        <a href="campaign-completed.html" style="color:#fff;text-decoration:none;font-size:13px;font-weight:600;padding:6px 14px;border:1px solid rgba(255,255,255,0.3);border-radius:6px;background:rgba(255,255,255,0.08);">&#8592; Back</a>
        <a href="index.html" style="color:#fff;text-decoration:none;font-size:13px;font-weight:700;opacity:0.7;">&#9679; 18 / 39</a>
        <a href="meeting-scheduled.html" style="color:#fff;text-decoration:none;font-size:13px;font-weight:600;padding:6px 14px;border:1px solid rgba(255,255,255,0.3);border-radius:6px;background:rgba(255,255,255,0.08);">Next &#8594;</a>
    </div>
    <div style="height:50px;"></div>
    <!-- GLOBAL NAVIGATION BAR -->
    
    <!-- END GLOBAL NAVIGATION BAR -->

    <div class="card">
        <button class="close-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <div class="left-col">
            <div class="status-dot-top"></div>
            <div class="icon-large">
                <!-- Large Calendar Check Icon (Professional Composite) -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <g transform="translate(2, 2) scale(1.15)">
                        <!-- Calendar Body -->
                        <rect x="3" y="4" width="18" height="18" rx="2.5" stroke-width="2.5" />
                        <!-- Top rings -->
                        <line x1="16" y1="2" x2="16" y2="7" stroke-width="2.5" />
                        <line x1="8" y1="2" x2="8" y2="7" stroke-width="2.5" />
                        <!-- Horizontal line -->
                        <line x1="3" y1="11" x2="21" y2="11" stroke-width="2.5" />
                    </g>
                    
                    <!-- Mask (matches --gray-bg) to cut out bottom right corner perfectly -->
                    <circle cx="26" cy="26" r="9.5" fill="var(--gray-bg)" stroke="none" />
                    
                    <!-- Super Bold Checkmark -->
                    <path d="M 17 24.5 l 4.5 4.5 l 9 -9" stroke-width="3.5" />
                </svg>
            </div>
        </div>

        <div class="notification-details">
            <div class="notification-title-top">EVENT NOTIFICATION</div>
            <div class="info-name">Reminder: <i>Your event (ert) is scheduled ...</i></div>
            
            <div class="info-row">
                <span class="info-item">
                    <!-- Calendar Check Small -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="4" rx="2" />
                        <path d="M16 2v4" />
                        <path d="M8 2v4" />
                        <path d="M3 10h18" />
                        <path d="M9 16l2 2 4-4" />
                    </svg>
                    Test 1
                </span>
                <span class="info-separator">|</span>
                <span class="info-item">
                    <!-- Calendar Days -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="4" rx="2" />
                        <path d="M16 2v4" />
                        <path d="M8 2v4" />
                        <path d="M3 10h18" />
                        <path d="M8 14h.01" />
                        <path d="M12 14h.01" />
                        <path d="M16 14h.01" />
                        <path d="M8 18h.01" />
                        <path d="M12 18h.01" />
                        <path d="M16 18h.01" />
                    </svg>
                    01 Jul 2026
                </span>
                <span class="info-separator">|</span>
                <span class="info-item">
                    <!-- Clock -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    15:34
                </span>
                <span class="info-separator">|</span>
                <span class="info-item">
                    <!-- Bell -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
                        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
                    </svg>
                    <span class="badge-upcoming">Upcoming</span>
                </span>
                
                <!-- Spacer to push button to right if needed, but in original it's just flex layout -->
                <button class="btn-outline" style="margin-left: auto;">
                    <!-- Calendar Empty -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="4" rx="2" />
                        <path d="M16 2v4" />
                        <path d="M8 2v4" />
                        <path d="M3 10h18" />
                    </svg>
                    View Event
                </button>
            </div>

            <div class="subtext">You will be notified before the event starts.</div>
        </div>
    </div>

    <script>
        document.querySelector('.close-btn').addEventListener('click', function() {
            const card = this.closest('.card');
            card.style.transition = 'opacity 0.3s ease';
            card.style.opacity = '0';
            setTimeout(() => {
                card.style.display = 'none';
            }, 300);
        });

        document.querySelector('.btn-outline').addEventListener('click', function() {
            alert('View Event clicked!');
        });
    </script>
</body>
</html>
