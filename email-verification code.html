<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DialPhone Verification Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: #f5f5f5;
            font-family: 'Inter', sans-serif;
            padding: 40px;
        }

        .email-wrapper {
            max-width: 850px;
            margin: auto;
            background: #fff;
            border: 1px solid #dcdcdc;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        /* HEADER */
        .header {
            padding: 40px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 30px;
        }

        .logo img {
            width: 100%;
        }

        .vertical-line {
            width: 1px;
            height: 100px;
            background: #d8d8d8;
            margin-right: 30px;
        }

        .heading h1 {
            font-size: 34px;
            line-height: 1.2;
            font-weight: 800;
            color: #000;
            letter-spacing: -0.5px;
        }

        .header-right {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            width: 40%;
        }

        .header-right svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* DIVIDER */
        .divider {
            border-top: 1px solid #e2e2e2;
        }

        /* CONTENT */
        .content {
            padding: 50px 60px 40px 60px;
            text-align: center;
        }

        .content h2 {
            font-size: 26px;
            font-weight: 800;
            color: #000;
            margin-bottom: 15px;
            letter-spacing: -0.3px;
        }

        .content p {
            font-size: 16px;
            line-height: 1.6;
            color: #333333;
            font-weight: 400;
        }

        /* OTP SECTION */
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
        }

        .otp-box {
            width: 70px;
            height: 80px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 44px;
            font-weight: 800;
            color: #000000;
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        /* SHIELD DIVIDER */
        .shield-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px auto 30px auto;
        }

        .shield-line {
            width: 80px;
            height: 1px;
            background: #dcdcdc;
        }

        .shield-icon {
            margin: 0 15px;
            display: flex;
            align-items: center;
        }

        .bottom-message {
            text-align: center;
            font-size: 16px;
            color: #333333;
            margin-bottom: 8px;
        }

        .bottom-message strong {
            color: #000;
            font-weight: 800;
        }

        /* FOOTER */
        .footer {
            background: #f8f8f8;
            border-top: 1px solid #e2e2e2;
            padding: 35px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .help-icon-black {
            width: 50px;
            height: 50px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .footer-text {
            font-size: 15px;
            line-height: 1.6;
            color: #333333;
            text-align: left;
        }

        .footer-text strong {
            font-weight: 800;
            color: #000;
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .footer-vertical-line {
            width: 1px;
            height: 50px;
            background: #dcdcdc;
        }

        .social-icons {
            display: flex;
            gap: 15px;
        }

        .social-icon {
            width: 36px;
            height: 36px;
            background: #000000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .social-icon:hover {
            transform: scale(1.05);
        }

        /* BOTTOM BAR */
        .bottom-bar {
            height: 6px;
            background: #d8d8d8;
            position: relative;
        }

        .bottom-bar::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            border-radius: 0 4px 4px 0;
        }

        @media(max-width:900px) {
            .header {
                flex-direction: column;
                gap: 30px;
            }

            .header-left {
                flex-direction: column;
                text-align: center;
            }

            .vertical-line {
                display: none;
            }

            .header-right {
                width: 100%;
                justify-content: center;
            }

            .header-right svg {
                max-width: 350px;
            }

            .content,
            .footer {
                padding: 40px;
            }

            .otp-container {
                flex-wrap: wrap;
            }

            .otp-box {
                width: 55px;
                height: 65px;
                font-size: 32px;
            }

            .footer {
                flex-direction: column;
                text-align: center;
                gap: 30px;
            }

            .footer-left {
                flex-direction: column;
                text-align: center;
            }

            .footer-right {
                flex-direction: column;
            }

            .footer-vertical-line {
                width: 100px;
                height: 1px;
            }

            .footer-text {
                text-align: center;
            }
        }
    </style>

</head>
