<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DialPhone Verification Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: #f5f5f5;
            font-family: 'Inter', sans-serif;
            padding: 40px;
        }

        .email-wrapper {
            max-width: 850px;
            margin: auto;
            background: #fff;
            border: 1px solid #dcdcdc;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        /* HEADER */
        .header {
            padding: 40px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 30px;
        }

        .logo img {
            width: 100%;
        }

        .vertical-line {
            width: 1px;
            height: 100px;
            background: #d8d8d8;
            margin-right: 30px;
        }

        .heading h1 {
            font-size: 34px;
            line-height: 1.2;
            font-weight: 800;
            color: #000;
            letter-spacing: -0.5px;
        }

        .header-right {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            width: 40%;
        }

        .header-right svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* DIVIDER */
        .divider {
            border-top: 1px solid #e2e2e2;
        }

        /* CONTENT */
        .content {
            padding: 50px 60px 40px 60px;
            text-align: center;
        }

        .content h2 {
            font-size: 26px;
            font-weight: 800;
            color: #000;
            margin-bottom: 15px;
            letter-spacing: -0.3px;
        }

        .content p {
            font-size: 16px;
            line-height: 1.6;
            color: #333333;
            font-weight: 400;
        }

        /* OTP SECTION */
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
        }

        .otp-box {
            width: 70px;
            height: 80px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 44px;
            font-weight: 800;
            color: #000000;
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        /* SHIELD DIVIDER */
        .shield-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px auto 30px auto;
        }

        .shield-line {
            width: 80px;
            height: 1px;
            background: #dcdcdc;
        }

        .shield-icon {
            margin: 0 15px;
            display: flex;
            align-items: center;
        }

        .bottom-message {
            text-align: center;
            font-size: 16px;
            color: #333333;
            margin-bottom: 8px;
        }

        .bottom-message strong {
            color: #000;
            font-weight: 800;
        }

        /* FOOTER */
        .footer {
            background: #f8f8f8;
            border-top: 1px solid #e2e2e2;
            padding: 35px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .help-icon-black {
            width: 50px;
            height: 50px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .footer-text {
            font-size: 15px;
            line-height: 1.6;
            color: #333333;
            text-align: left;
        }

        .footer-text strong {
            font-weight: 800;
            color: #000;
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .footer-vertical-line {
            width: 1px;
            height: 50px;
            background: #dcdcdc;
        }

        .social-icons {
            display: flex;
            gap: 15px;
        }

        .social-icon {
            width: 36px;
            height: 36px;
            background: #000000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .social-icon:hover {
            transform: scale(1.05);
        }

        /* BOTTOM BAR */
        .bottom-bar {
            height: 6px;
            background: #d8d8d8;
            position: relative;
        }

        .bottom-bar::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            border-radius: 0 4px 4px 0;
        }

        @media(max-width:900px) {
            .header {
                flex-direction: column;
                gap: 30px;
            }

            .header-left {
                flex-direction: column;
                text-align: center;
            }

            .vertical-line {
                display: none;
            }

            .header-right {
                width: 100%;
                justify-content: center;
            }

            .header-right svg {
                max-width: 350px;
            }

            .content,
            .footer {
                padding: 40px;
            }

            .otp-container {
                flex-wrap: wrap;
            }

            .otp-box {
                width: 55px;
                height: 65px;
                font-size: 32px;
            }

            .footer {
                flex-direction: column;
                text-align: center;
                gap: 30px;
            }

            .footer-left {
                flex-direction: column;
                text-align: center;
            }

            .footer-right {
                flex-direction: column;
            }

            .footer-vertical-line {
                width: 100px;
                height: 1px;
            }

            .footer-text {
                text-align: center;
            }
        }
    </style>

</head>

<body>

    <div class="email-wrapper">

        <div class="header">

            <div class="header-left">
                <!-- Logo -->
                <div class="logo">
                    <img src="https://res.cloudinary.com/dts1f4835/image/upload/v1781101913/dialphone-logo-only_1_mks7lx.png"
                        alt="Logo">
                </div>

                <div class="vertical-line"></div>

                <div class="heading">
                    <h1>DialPhone Verification Code</h1>
                </div>
            </div>

            <div class="header-right">

                <svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 440 260" width="100%" height="100%">
                    <!-- Subtle Background Clouds -->
                    <path
                        d="M 120,180 C 60,180 70,120 120,100 C 140,60 220,60 260,90 C 310,70 370,110 340,170 C 320,200 180,210 120,180 Z"
                        fill="#f8fafc" />

                    <!-- Decorative Elements (+ and o) -->
                    <path d="M 120,65 v 10 M 115,70 h 10" stroke="#111827" stroke-width="2.5" stroke-linecap="round" />
                    <path d="M 110,180 v 10 M 105,185 h 10" stroke="#111827" stroke-width="2.5"
                        stroke-linecap="round" />
                    <path d="M 330,165 v 10 M 325,170 h 10" stroke="#111827" stroke-width="2.5"
                        stroke-linecap="round" />

                    <circle cx="80" cy="110" r="4.5" fill="none" stroke="#111827" stroke-width="2.5" />
                    <circle cx="370" cy="115" r="4.5" fill="none" stroke="#111827" stroke-width="2.5" />

                    <!-- Dashed Paths -->
                    <path d="M 60,190 C 80,120 130,150 160,130" stroke="#111827" stroke-width="2" stroke-dasharray="3,8"
                        stroke-linecap="round" fill="none" />
                    <path d="M 280,110 C 290,135 300,95 315,78" stroke="#111827" stroke-width="2" stroke-dasharray="3,8"
                        stroke-linecap="round" fill="none" />

                    <!-- Paper Airplane -->
                    <path d="M 320,75 L 400,35 L 350,80 Z" fill="#ffffff" stroke="#111827" stroke-width="2.5"
                        stroke-linejoin="round" />
                    <path d="M 400,35 L 350,80 L 360,105 Z" fill="#111827" stroke="#111827" stroke-width="2.5"
                        stroke-linejoin="round" />

                    <!-- ENVELOPE & CARD STRUCTURE -->
                    <!-- Layer 1 & 2: Envelope Back & Inside -->
                    <rect x="150" y="80" width="140" height="90" fill="#111827" />
                    <path d="M 150,80 L 220,35 L 290,80 Z" fill="#111827" stroke="#111827" stroke-width="2"
                        stroke-linejoin="round" />

                    <!-- Layer 3: The Notification Card -->
                    <rect x="175" y="25" width="90" height="120" rx="6" fill="#ffffff" stroke="#111827"
                        stroke-width="3" />

                    <!-- Padlock Icon -->
                    <path d="M 212,50 v -6 a 8,8 0 0 1 16,0 v 6" stroke="#111827" stroke-width="3" fill="none"
                        stroke-linejoin="round" />
                    <rect x="206" y="50" width="28" height="20" rx="4" fill="#111827" />
                    <!-- Keyhole -->
                    <circle cx="220" cy="58" r="2.5" fill="#ffffff" />
                    <path d="M 219,60 l -1.5,5 h 5 l -1.5,-5 z" fill="#ffffff" />

                    <!-- 5 Dots -->
                    <circle cx="192" cy="90" r="3.5" fill="#111827" />
                    <circle cx="206" cy="90" r="3.5" fill="#111827" />
                    <circle cx="220" cy="90" r="3.5" fill="#111827" />
                    <circle cx="234" cy="90" r="3.5" fill="#111827" />
                    <circle cx="248" cy="90" r="3.5" fill="#111827" />

                    <!-- Layer 4: Envelope Front Flaps -->
                    <path d="M 150,80 L 220,135 L 290,80 L 290,170 L 150,170 Z" fill="#ffffff" />
                    <path d="M 150,80 L 220,135 L 290,80" stroke="#111827" stroke-width="3" fill="none"
                        stroke-linejoin="round" />
                    <path d="M 150,170 L 220,115 L 290,170" stroke="#111827" stroke-width="3" fill="none"
                        stroke-linejoin="round" />
                    <rect x="150" y="80" width="140" height="90" rx="3" fill="none" stroke="#111827" stroke-width="3" />

                    <!-- Layer 5: Checkmark Badge -->
                    <circle cx="285" cy="155" r="24" fill="#ffffff" />
                    <circle cx="285" cy="155" r="20" fill="#111827" />
                    <path d="M 275,155 l 6,6 l 12,-12" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"
                        stroke-linejoin="round" fill="none" />
                </svg>

            </div>

        </div>

        <div class="divider"></div>

        <div class="content">

            <h2>Hello,</h2>

            <p>
                Use the OTP below to verify your account.
            </p>

            <div class="otp-container">
                <div class="otp-box">4</div>
                <div class="otp-box">8</div>
                <div class="otp-box">2</div>
                <div class="otp-box">7</div>
                <div class="otp-box">6</div>
                <div class="otp-box">1</div>
            </div>

            <!-- SHIELD DIVIDER -->
            <div class="shield-divider">
                <div class="shield-line"></div>
                <div class="shield-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="#111827" stroke="#111827" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="M9 12l2 2 4-4" stroke="#ffffff" stroke-width="2.5" fill="none"></path>
                    </svg>
                </div>
                <div class="shield-line"></div>
            </div>

            <p class="bottom-message">
                This OTP will expire in <strong>10 minutes.</strong>
            </p>
            <p class="bottom-message">
                Please do not share it with anyone.
            </p>

        </div>

        <div class="footer">
            <div class="footer-left">
                <div class="help-icon-black">?</div>
                <div class="footer-text">
                    If you didn't request this code,<br>
                    <strong>please ignore this email</strong> or contact our support team.
                </div>
            </div>


        </div>

        <!-- Bottom Bar -->
        <div class="bottom-bar"></div>

    </div>

</body>

</html>
