<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Back Scheduled Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --green: #109432; /* darker vibrant green */
            --green-icon: #109432;
            --green-bg: #eaf7ec; /* light green for circle */
            --green-badge-bg: #dcfce7;
            --green-badge-text: #15803d;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --text-dark: #1e1b4b; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: var(--gray-900);
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            background-color: #ffffff;
            width: 100%;
            max-width: 1100px;
        }

        .notification-card {
            position: relative;
            padding: 24px 32px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: absolute;
            top: 24px;
            left: 24px;
            right: 24px;
        }

        .status-dot-top {
            width: 12px;
            height: 12px;
            background-color: var(--green);
            border-radius: 50%;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--gray-900);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .close-btn:hover {
            background-color: var(--gray-100);
        }

        .close-btn:active {
            transform: scale(0.95);
        }

        .close-btn svg {
            width: 24px;
            height: 24px;
            stroke-width: 1.5;
        }

        .card-body {
            display: flex;
            align-items: flex-start;
            gap: 28px;
            margin-top: 16px;
            padding-left: 24px;
        }

        .icon-large {
            width: 96px;
            height: 96px;
            background-color: var(--green-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .icon-large svg {
            width: 44px;
            height: 44px;
            color: var(--green-icon);
        }

        .notification-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .notification-title {
            color: var(--green);
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.01em;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 15px;
            flex-wrap: wrap;
        }

        .info-name {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 20px;
            margin-right: 8px;
        }

        .info-separator {
            color: var(--gray-300);
            font-weight: 300;
        }

        .info-item {
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .info-item svg {
            width: 18px;
            height: 18px;
            color: var(--text-dark);
        }

        .badge {
            background-color: var(--green-badge-bg);
            color: var(--green-badge-text);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2px;
        }

        .subtext {
            color: var(--gray-600);
            font-size: 15px;
            font-weight: 500;
        }

        .btn-outline {
            border: 1px solid var(--gray-400);
            background-color: #ffffff;
            color: var(--text-dark);
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-outline:hover {
            background-color: var(--gray-50);
        }

        .btn-outline:active {
            transform: scale(0.98);
            background-color: var(--gray-100);
        }

        .btn-outline svg {
            width: 16px;
            height: 16px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .card-body {
                flex-direction: column;
                align-items: center;
                padding-left: 0;
            }
            .bottom-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
            .btn-outline {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

                    <span class="info-item">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>

                        02:30 PM
                    </span>
                    <span class="info-separator">|</span>
                    <span class="badge">Today</span>
                    <span class="info-separator">|</span>
                    <button class="btn-outline">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        View Schedule
                    </button>
                </div>

                <div class="bottom-row" style="margin-top: 16px;">
                    <div class="subtext"><span style="font-weight: 700; color: var(--gray-900);">Reason:</span> Follow up on product demo</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('.close-btn').addEventListener('click', function() {
            const card = this.closest('.notification-card');
            card.style.transition = 'opacity 0.3s ease';
            card.style.opacity = '0';
            setTimeout(() => {
                card.style.display = 'none';
            }, 300);
        });

        document.querySelector('.btn-outline').addEventListener('click', function() {
            alert('View Schedule clicked! Redirecting to schedule...');
        });
    </script>
</body>
