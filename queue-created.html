<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Created Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --blue: #0066FF;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: var(--gray-900);
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            background-color: #ffffff;
            width: 100%;
            max-width: 750px;
        }

        .notification-card {
            position: relative;
            padding: 24px 32px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: absolute;
            top: 24px;
            left: 24px;
            right: 24px;
        }

        .black-dot-top {
            width: 12px;
            height: 12px;
            background-color: var(--blue);
            border-radius: 50%;
        }


        .close-btn {
            background: none;
            border: none;
            color: var(--gray-900);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .close-btn:hover {
            background-color: var(--gray-100);
        }

        .close-btn:active {
            transform: scale(0.95);
        }

        .close-btn svg {
            width: 24px;
            height: 24px;
            stroke-width: 1.5;
        }

        .card-body {
            display: flex;
            align-items: flex-start;
            gap: 28px;
            margin-top: 16px;
            padding-left: 24px;
        }

        .icon-large {
            width: 96px;
            height: 96px;
            background-color: var(--gray-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .icon-large svg {
            width: 44px;
            height: 44px;
            color: var(--black);
            stroke-width: 2.2;
        }

        .notification-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .notification-title {
            color: var(--blue);
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.01em;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 15px;
            flex-wrap: wrap;
        }

        .info-name {
            font-weight: 700;
            color: var(--black);
            font-size: 20px;
            margin-right: 8px;
        }

        .info-separator {
            color: var(--gray-300);
            font-weight: 300;
        }

        .info-item {
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .info-item svg {
            width: 18px;
            height: 18px;
            color: var(--black);
        }

        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2px;
        }

        .subtext {
            color: var(--gray-800);
            font-size: 15px;
            font-weight: 500;
        }

        .btn-outline {
            border: 1px solid var(--gray-400);
            background-color: #ffffff;
            color: var(--black);
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-outline:hover {
            background-color: var(--gray-50);
        }

        .btn-outline:active {
            transform: scale(0.98);
            background-color: var(--gray-100);
        }

        .btn-outline svg {
            width: 16px;
            height: 16px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card-body {
                flex-direction: column;
                align-items: center;
                padding-left: 0;
            }

            .bottom-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .btn-outline {
                margin-left: 0;
            }
        }
    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        

    
        /* --- BEGIN GLOBAL OVERRIDES --- */
        /* --- GLOBAL MOBILE OVERRIDES --- */
        @media (max-width: 640px) {
            body { 
                padding-left: 12px !important; 
                padding-right: 12px !important; 
                padding-top: 60px !important;
            }
            .container, .card, .email-container, .main-wrapper, .email-wrapper { 
                width: 100% !important; 
                max-width: 100% !important; 
                padding: 16px !important;
                box-sizing: border-box !important;
            }
            /* Force header elements into a single row */
            .header, .top-banner {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                align-items: center !important;
                justify-content: space-between !important;
                padding: 16px 8px !important;
                gap: 8px !important;
                box-sizing: border-box !important;
                min-height: 40px !important;
                overflow: visible !important;
            }
            .header-left, .logo-section, .header-title-container, .brand-section, .logo-area {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                align-items: center !important;
                gap: 8px !important;
                flex: 1 !important;
                min-width: 0 !important;
            }
            /* Prevent logo wrapper from shrinking to 0 width */
            div.logo, span.logo, .header-logo, .logo-icon {
                flex-shrink: 1 !important;
                width: auto !important;
                height: auto !important;
                margin: 0 !important;
                min-width: 0 !important;
                display: flex !important;
                align-items: center !important;
                gap: 8px !important;
            }
            /* Apply strict medium height ONLY to images */
            img.logo, .logo-img, .header-logo img, .logo-icon img, .brand-section img, div.logo img {
                height: 48px !important; 
                width: auto !important;
                flex-shrink: 0 !important;
                display: block !important;
                max-width: 100% !important;
            }
            .logo-text, .header-title, .logo-title, .brand-title, .heading h1, .header-text h1, .heading h2, .header-text h2, .heading h3, .header-text h3, .heading small {
                font-size: 16px !important; 
                line-height: 1.25 !important;
                margin: 0 !important;
                white-space: nowrap !important;
                text-overflow: ellipsis !important;
                overflow: hidden !important;
                text-align: left !important;
                min-width: 0 !important;
            }
            .logo-text-wrapper, .logo-text-block, .heading, .header-text, .header-center, .header-title-block {
                display: flex !important;
                flex-direction: row !important;
                align-items: center !important;
                justify-content: flex-start !important;
                gap: 4px !important;
                min-width: 0 !important;
                flex: 1 !important;
                border: none !important;
                padding-left: 0 !important;
            }
            .logo-subtitle, .logo-tagline, .banner-desc, .heading p, .header-text p, .header-subtitle {
                display: none !important;
            }
            /* The icon/illustration in the header */
            .header-right, .header-illustration, .header-right-td, .banner-illustration, .header-icon, .hero-illustration {
                display: flex !important;
                width: 115px !important; 
                max-width: 115px !important;
                flex: 0 0 115px !important;
                height: 100% !important;
                min-height: 40px !important;
                align-items: center !important;
                justify-content: center !important;
                padding-left: 0 !important;
                overflow: visible !important;
            }
            .header-right svg, .header-illustration svg, .banner-illustration svg, .header-icon svg, .hero-illustration svg {
                width: 100% !important;
                height: auto !important;
                max-width: 100% !important;
                max-height: 100% !important;
                object-fit: contain !important;
                overflow: visible !important;
            }
            svg.hero-svg {
                max-width: 180px !important;
                height: auto !important;
                margin: 0 auto !important;
                display: block !important;
            }
            /* Stack other body elements */
            .info-row, .features-row, .alert-actions { 
                display: flex !important;
                flex-direction: column !important; 
                align-items: flex-start !important;
                gap: 12px !important;
            }
            .btn, .btn-outline, .btn-primary, .support-btn, .dashboard-btn, .confirm-btn {
                width: 100% !important;
                justify-content: center !important;
                margin: 12px 0 0 0 !important;
                box-sizing: border-box !important;
            }
            .info-separator, .logo-divider, .header-divider, .brand-divider, .vertical-line-header, .header-left .vertical-line { display: none !important; }
            .info-item { margin-bottom: 8px !important; }
            
            /* Force OTP boxes into a single line */
            .otp-container {
                flex-wrap: nowrap !important;
                gap: 6px !important;
                width: 100% !important;
                justify-content: center !important;
                padding: 0 !important;
            }
            .otp-box {
                flex: 1 1 0 !important;
                width: auto !important;
                max-width: 50px !important;
                height: 55px !important;
                font-size: 24px !important;
            }
            
            /* Table-based email template overrides */
            td.header-cell {
                padding: 12px 8px !important;
                display: block !important;
            }
            td.header-cell > table, 
            td.header-cell > table > tbody,
            td.header-cell > table > tbody > tr {
                display: flex !important;
                width: 100% !important;
                flex-direction: row !important;
                align-items: center !important;
                justify-content: space-between !important;
            }
            td.header-cell > table > tbody > tr > td:first-child {
                display: flex !important;
                flex: 1 !important;
                min-width: 0 !important;
            }
            td.header-cell > table > tbody > tr > td:first-child > table,
            td.header-cell > table > tbody > tr > td:first-child > table > tbody,
            td.header-cell > table > tbody > tr > td:first-child > table > tbody > tr {
                display: flex !important;
                width: 100% !important;
                flex-direction: row !important;
                align-items: center !important;
            }
            td.header-cell > table > tbody > tr > td:first-child > table > tbody > tr > td:nth-child(1) {
                flex-shrink: 0 !important;
                display: block !important;
            }
            td.header-cell > table > tbody > tr > td:first-child > table > tbody > tr > td:nth-child(2) {
                display: none !important;
            }
            td.header-cell > table > tbody > tr > td:first-child > table > tbody > tr > td:nth-child(3) {
                flex: 1 !important;
                min-width: 0 !important;
                padding-left: 8px !important;
                border-left: 1px solid #eaeaea !important;
            }
            td.header-cell > table > tbody > tr > td:first-child > table > tbody > tr > td:nth-child(3) span {
                font-size: 16px !important;
                white-space: nowrap !important;
                text-overflow: ellipsis !important;
                overflow: hidden !important;
                display: block !important;
            }
            td.header-right-td {
                display: flex !important;
                width: 115px !important; 
                max-width: 115px !important;
                flex: 0 0 115px !important;
                align-items: center !important;
                justify-content: center !important;
            }
        }
        
        /* --- GLOBAL DESKTOP OVERRIDES --- */
        @media (min-width: 641px) {
            .email-wrapper, .email-container, table.main, .container {
                max-width: 720px !important;
                margin-left: auto !important;
                margin-right: auto !important;
            }
            .logo, .header-logo {
                width: 64px !important;
                height: 64px !important;
                flex-shrink: 0 !important;
            }
            .header, .top-banner {
                padding: 30px 40px !important;
                flex-wrap: nowrap !important;
            }
            .vertical-line, .vertical-line-header, .logo-divider, .header-divider {
                margin-right: 20px !important;
            }
            .header-right, .header-illustration {
                width: 100% !important;
                max-width: 160px !important;
                flex-shrink: 0 !important;
                height: auto !important;
            }
            .header-right svg, .header-illustration svg {
                width: 100% !important;
                height: auto !important;
            }
            .heading {
                display: flex !important;
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 6px !important;
                white-space: nowrap !important;
            }
            .heading h1, .heading h2, .heading h3, .heading small, .logo-text, .header-title {
                display: inline-block !important;
                margin: 0 !important;
                white-space: nowrap !important;
            }
            .heading small, .heading h2:first-child:not(:last-child) {
                font-size: 13px !important;
                font-weight: 700 !important;
                color: #555 !important;
                letter-spacing: 0.5px !important;
            }
            .heading h1, .heading h2:only-child, .heading h3:only-child, .logo-text, .header-title {
                font-size: 24px !important;
            }
            div.notification-card {
                max-width: 1150px !important;
                width: fit-content !important;
            }
        }
        /* --- END GLOBAL OVERRIDES --- */

    </style>
</head>

    <script>
        document.querySelector('.close-btn').addEventListener('click', function () {
            const card = this.closest('.notification-card');
            card.style.transition = 'opacity 0.3s ease';
            card.style.opacity = '0';
            setTimeout(() => {
                card.style.display = 'none';
            }, 300);
        });
