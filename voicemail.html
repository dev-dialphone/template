<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voicemail Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-50: #eef8ff;
            --blue-500: #007aff;
            --blue-600: #0062cc;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-900: #111827;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: var(--gray-900);
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            background-color: #ffffff;
            width: 100%;
            max-width: 1100px;
        }

        .notification-card {
            position: relative;
            padding: 24px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: absolute;
            top: 24px;
            left: 24px;
            right: 24px;
        }

        .blue-dot-top {
            width: 14px;
            height: 14px;
            background-color: var(--blue-500);
            border-radius: 50%;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--gray-900);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .close-btn:hover {
            background-color: var(--gray-200);
        }

        .close-btn:active {
            transform: scale(0.95);
        }

        .close-btn svg {
            width: 24px;
            height: 24px;
            stroke-width: 1.5;
        }

        .card-body {
            display: flex;
            align-items: center;
            gap: 32px;
            margin-top: 12px;
            padding-left: 64px;
        }

        .icon-large {
            width: 90px;
            height: 90px;
            background-color: var(--blue-50);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-large svg {
            width: 44px;
            height: 44px;
            color: var(--blue-500);
        }

        .notification-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .notification-title {
            color: var(--blue-500);
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.01em;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 15px;
        }

        .info-name {
            font-weight: 700;
            color: var(--gray-900);
            font-size: 18px;
        }

        .info-separator {
            color: var(--gray-300);
            font-weight: 300;
        }

        .info-number {
            color: var(--gray-900);
            font-weight: 400;
        }

        .info-time {
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
        }
        
        .info-time svg {
            width: 18px;
            height: 18px;
            color: var(--gray-900);
        }

        .info-duration {
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
        }

        .info-duration svg {
            width: 18px;
            height: 18px;
            color: var(--gray-900);
        }

        .btn-outline {
            border: 1px solid var(--gray-600);
            background-color: #ffffff;
            color: var(--gray-900);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-outline:hover {
            background-color: var(--gray-50);
        }

        .btn-outline:active {
            transform: scale(0.98);
            background-color: var(--gray-100);
        }

        .btn-outline svg {
            width: 16px;
            height: 16px;
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .card-body {
                flex-direction: column;
                align-items: center;
                padding-left: 0;
                gap: 16px;
                text-align: center;
            }
            
            .info-row {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            
            .info-separator {
                display: none;
            }
            
            .btn-outline {
                margin-left: 0 !important;
                margin-top: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- GLOBAL NAVIGATION BAR -->
    <div
        style="background: #111; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-family: 'Inter', sans-serif; position: fixed; top: 0; left: 0; width: 100%; box-sizing: border-box; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <a href="tasks-notification.html"
            style="color: #fff; text-decoration: none; font-size: 14px; font-weight: 600; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; transition: 0.3s;">&larr;
            Back</a>
        <a href="index.html"
            style="color: #fff; text-decoration: none; font-size: 16px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;">VOICEMAIL</a>
        <a href="callback-scheduled.html"
            style="color: #fff; text-decoration: none; font-size: 14px; font-weight: 600; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; transition: 0.3s;">Next
            &rarr;</a>
    </div>
    <!-- END GLOBAL NAVIGATION BAR -->

    <div class="card notification-card">
        <div class="card-header">
            <div class="blue-dot-top"></div>
            <button class="close-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="card-body">
            <div class="icon-large">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="5.5" cy="11.5" r="4.5"></circle>
                    <circle cx="18.5" cy="11.5" r="4.5"></circle>
                    <line x1="5.5" y1="16" x2="18.5" y2="16"></line>
                </svg>
            </div>
            <div class="notification-details">
                <div class="notification-title">Voicemail</div>
                <div class="info-row">
                    <span class="info-name">John Smith</span>
                    <span class="info-separator">|</span>
                    <span class="info-number">+1 (555) 123-4567</span>
                    <span class="info-separator">|</span>
                    <span class="info-time">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        Today, 10:30 AM
                    </span>
                    <span class="info-separator">|</span>
                    <span class="info-duration">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        01:23
                    </span>
                    <button class="btn-outline" style="margin-left: 32px;">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="6" width="20" height="12" rx="2" ry="2"></rect>
                            <circle cx="8" cy="12" r="2"></circle>
                            <circle cx="16" cy="12" r="2"></circle>
                        </svg>
                        Play Voicemail
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('.close-btn').addEventListener('click', function() {
            const card = this.closest('.notification-card');
            card.style.transition = 'opacity 0.3s ease';
            card.style.opacity = '0';
            setTimeout(() => {
                card.style.display = 'none';
            }, 300);
        });

        document.querySelector('.btn-outline').addEventListener('click', function() {
            alert('Play Voicemail clicked! Playing audio...');
        });
    </script>
</body>
</html>
